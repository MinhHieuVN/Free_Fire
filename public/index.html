<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>GARENA ACCOUNT BIND TOOL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #050505; color: #ffd700; font-family: 'Segoe UI', sans-serif; }
        .cyber-panel { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 2px solid #ffd700; border-radius: 20px; box-shadow: 0 0 30px #ffd70044; }
        .neon-btn { background: transparent; border: 1px solid #ffd700; color: #ffd700; transition: 0.3s; }
        .neon-btn:hover { background: #ffd700; color: #000; box-shadow: 0 0 20px #ffd700; transform: scale(1.05); }
        .form-control { background: #000; border: 1px solid #333; color: #00f2ff; }
        .log-box { height: 250px; background: #000; color: #0f0; font-family: monospace; overflow-y: auto; border: 1px solid #333; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body class="p-4">
    <div class="container animate__animated animate__zoomIn">
        <div class="cyber-panel p-4">
            <h2 class="text-center mb-4">GARENA MANAGEMENT DASHBOARD</h2>
            
            <div class="row g-3">
                <div class="col-md-6">
                    <input type="text" id="token" class="form-control mb-2" placeholder="Access Token">
                    <input type="text" id="email" class="form-control mb-2" placeholder="Email">
                    <input type="text" id="otp" class="form-control mb-2" placeholder="OTP">
                </div>
                <div class="col-md-6">
                    <input type="password" id="password" class="form-control mb-2" placeholder="Mật khẩu cấp 2">
                    <input type="text" id="identity" class="form-control mb-2" placeholder="Identity Token (Auto)" readonly>
                    <input type="text" id="verifier" class="form-control mb-2" placeholder="Verifier Token (Auto)" readonly>
                </div>
            </div>

            <div class="d-flex flex-wrap gap-2 mt-4 justify-content-center">
                <button class="btn neon-btn" onclick="run('info')">CHECK INFO</button>
                <button class="btn neon-btn" onclick="run('user_info')">UID INFO</button>
                <button class="btn neon-btn" onclick="run('send_otp')">GỬI OTP</button>
                <button class="btn neon-btn" onclick="run('verify_otp')">XÁC THỰC OTP</button>
                <button class="btn neon-btn" onclick="run('verify_id_pass')">XÁC THỰC MK C2</button>
                <button class="btn btn-success" onclick="run('bind_new')">THÊM EMAIL</button>
                <button class="btn btn-warning" onclick="run('rebind')">ĐỔI EMAIL</button>
                <button class="btn btn-danger" onclick="run('unbind')">UNBIND</button>
                <button class="btn btn-outline-light" onclick="run('refresh')">LÀM MỚI TOKEN</button>
            </div>

            <div id="log" class="log-box mt-4">Hệ thống sẵn sàng...</div>
        </div>
    </div>

    <script>
        async function run(action) {
            const log = document.getElementById('log');
            Swal.fire({ title: 'Đang xử lý...', didOpen: () => Swal.showLoading() });

            const fd = new FormData();
            fd.append('action', action);
            ['token', 'email', 'otp', 'password', 'identity', 'verifier'].forEach(id => {
                fd.append(id, document.getElementById(id).value);
            });

            try {
                const res = await fetch('/api/call', { method: 'POST', body: fd });
                const data = await res.json();
                Swal.close();

                log.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${action.toUpperCase()}: ${JSON.stringify(data)}</div>`;
                log.scrollTop = log.scrollHeight;

                if(data.identity_token) document.getElementById('identity').value = data.identity_token;
                if(data.verifier_token) document.getElementById('verifier').value = data.verifier_token;
                if(data.access_token) document.getElementById('token').value = data.access_token;

                if(data.result === 0 || data.email) {
                    Swal.fire('Thành công!', '', 'success');
                } else {
                    Swal.fire('Thất bại', data.message || 'Lỗi hệ thống', 'error');
                }
            } catch (e) { Swal.fire('Lỗi kết nối', '', 'error'); }
        }
    </script>
</body>
</html>
